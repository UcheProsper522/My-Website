<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>advance styling</title>
</head>
<style>
    .box{
        width: 200px;
        height: 100px;
        background-color: dodgerblue;
        border-radius: 20px;
    }
    .circle{
        width: 150px;
        height:150px ;
        background-color: crimson;
        border-radius: 50%;
    }
    .Pill-button{
        padding: 12px 25px;
        border-radius: 50px;
    }
    .card{
        height: 200px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        width: 250px;
        background-color: white;
    }
  h1{
    text-shadow: 2px 2px 5px gray;
  }
   /*Transparent*/
  .trans{
    height: 50px;
    background-color: blue;
    opacity: 0.5;
  } 
  .bg-trans{
    height: 50px;
    background: rgba(0,0,255,0.6);
  }
  .h-trans{
    height: 50px;
    background: #00000000;
  }
  /*hover*/
  .btn:hover{
    background-color: black;
    color:yellow;
  }
  input:focus{
    border: 2px solid blue;
    outline: none;
  }
  .button:active{
    transform: scale(0.95);
  }
  a:visited{
    color: purple;
  }
  /*Transition*/
  .container{
    width: 200px;
    height: 100px;
    background-color: tomato;
    transition: 0.5s ease;
  }
    .container:hover{
        background-color: purple;
        width: 300px;
    }
    .holder{
        width: 100px;
        height: 100px;
        background-color: royalblue;
        transition: width 2s, height 2s, transform 2s;
    }
    .holder:hover{
        width: 300px;
        height: 300px;
        transform: rotate(180deg);
    }
    .con{
        width: 100px;
        height: 100px;
        background-color: black;
        transition-delay:  1s;
        transition-duration: 2s;
        transition-timing-function: linear;
    }
    .con:hover{
        width: 200px;
    }
    /*Animation*/
    .move{
        width: 100px;
        height: 100px;
        background-color: red;
        animation: movement 2s infinite alternate;
    }
    @keyframes movement  {
       from{
        transform: translate(0);
       }
    
         to{
            transform: translate(300px);
            background-color: blue;
         }
     }
     .fade{
        width: 200px;
        height: 100px;
        background-color: black;
        animation: fade 2s infinite;
     }
     @keyframes fade {
        0% {
            opacity: 0;
        }
        100% {
            opacity: 1;
        }
     }
     .loader{
        width: 80px;
        height: 80px;
        border: 8px solid #f3f3f3;
        border-top: 5px solid blue;
        border-radius: 50%;
        animation: spin 1s linear infinite;
     }
     @keyframes spin {
        0% {
            transform: rotate(0deg);
        }
        100% {
            transform: rotate(360deg);
        }
     }
        .scale-box{
            width: 100px;
            height: 100px;
            background-color: royalblue;
            margin: 40px 0px;
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
            100% {
                transform: scale(1);
            }
        }
        .skew-box{
            width: 100px;
            height: 50px;
            background-color: limegreen;
            margin: 40px 0;
            animation: skewmove 2s infinite alternate;
        }
        @keyframes skewmove {
            from {
                transform: skew(0deg);
            }
            to{
                transform: skew(20deg);
            }
            
            }
        
</style>
<body>
    <!--Rounded elements -->
    <div class="box"></div>
    <div class="circle"></div>
    <button class="Pill-button">Pill</button>
    <!-- box shadow -->
     <div class="card"></div>
      <h1>Lorem ipsum dolor sit amet.</h1> 
     <!-- transparent -->
      <div class="trans"></div>
      <div class="bg-trans"></div>
      <div class="h-trans"></div>

     <!-- hover -->
      <button class="btn">Hover</button>
      <input type="text" name="" placeholder="Name">
      <button class="button">Active</button>

      <!-- Transition -->
       <div class="container"></div>
         <div class="holder"></div>
         <div class="con"></div>
         <!-- Animation -->
          <div class="move"></div>
            <div class="fade"></div>
            <div class="loader"></div>
            <div class="scale-box"></div>
            <div class="skew-box"></div>
</body>
</html>
